<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>
    <clipPath id="star-clip">
      <path d="M30 0 C34.8 12, 48 25.2, 60 30 C48 34.8, 34.8 48, 30 60 C25.2 48, 12 34.8, 0 30 C12 25.2, 25.2 12, 30 0Z"/>
    </clipPath>
    <linearGradient id="gemini-text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#69B4FF"/>
    </linearGradient>
  </defs>
  <!-- Star with conic gradient approximation using radial sections -->
  <g clip-path="url(#star-clip)" transform="translate(5, 10)">
    <!-- Red (top) -->
    <path d="M30 30 L20 0 L40 0 Z" fill="#EA4335"/>
    <path d="M30 30 L40 0 L60 10 Z" fill="#EA4335"/>
    <!-- Blue (right) -->
    <path d="M30 30 L60 10 L60 20 Z" fill="#4285F4"/>
    <path d="M30 30 L60 20 L60 40 Z" fill="#4285F4"/>
    <path d="M30 30 L60 40 L60 50 Z" fill="#4285F4"/>
    <!-- Green (bottom) -->
    <path d="M30 30 L60 50 L40 60 Z" fill="#34A853"/>
    <path d="M30 30 L40 60 L20 60 Z" fill="#34A853"/>
    <path d="M30 30 L20 60 L0 50 Z" fill="#34A853"/>
    <!-- Yellow (left) -->
    <path d="M30 30 L0 50 L0 40 Z" fill="#FBBC05"/>
    <path d="M30 30 L0 40 L0 20 Z" fill="#F9AB00"/>
    <path d="M30 30 L0 20 L0 10 Z" fill="#EA4335"/>
    <path d="M30 30 L0 10 L20 0 Z" fill="#EA4335"/>
  </g>
  <!-- Gemini text -->
  <text x="78" y="56" font-family="Google Sans, Product Sans, Arial, sans-serif" font-size="48" font-weight="500" fill="url(#gemini-text-grad)">Gemini</text>
</svg>
